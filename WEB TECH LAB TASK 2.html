<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<h1>Library Membership Registration Form</h1>
  <p>Please fill in all required fields marked with <strong>*</strong>.</p>

  <form action="#" method="post">

    <fieldset>
      <legend>Personal Information</legend>

      <label for="fullname">Full Name *</label><br />
      <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required /><br /><br />

      <label for="membershipid">Membership ID *</label><br />
      <input type="text" id="membershipid" name="membershipid" placeholder="e.g. AIUB-2025-001" required /><br /><br>
       <label for="email">Email Address *</label><br />
      <input type="email" id="email" name="email" placeholder="example@email.com" required /><br /><br />

      <label for="phone">Phone Number *</label><br />
      <input type="tel" id="phone" name="phone" placeholder="+880 1XXXXXXXXX" required /><br /><br />

      <label for="dob">Date of Birth *</label><br />
      <input type="date" id="dob" name="dob" required /><br /><br />

      <label>Gender *</label><br />
      <input type="radio" id="male" name="gender" value="male" required />
      <label for="male">Male</label>&nbsp;
      <input type="radio" id="female" name="gender" value="female" />
      <label for="female">Female</label>&nbsp;
      <input type="radio" id="other" name="gender" value="other" />
      <label for="other">Other</label><br /><br />
       </fieldset><br />

    <fieldset>
      <legend>Membership Information</legend>

      <label for="membershiptype">Membership Type *</label><br />
      <select id="membershiptype" name="membershiptype" required>
        <option value="" disabled>-- Select Membership Type --</option>
        <option value="student" selected>Student</option>
        <option value="faculty">Faculty</option>
        <option value="researcher">Researcher</option>
        <option value="general">General Member</option>
      </select><br /><br />
      

</body>
</html>
